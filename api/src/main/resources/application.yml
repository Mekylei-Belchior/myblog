# Shared defaults — overridden per profile (dev / prod)
spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:blog
    username: sa
    password: '123'
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: false
  h2:
    console:
      enabled: false   # disabled by default; enabled only in dev profile
    settings:
      web-allow-others: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/specific/h2
    placeholder-replacement: false
    depends-on: entityManagerFactory
    log-sql: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}

# CORS — overridden per profile
cors:
  allowed-origins: "*"

# Actuator — expose health endpoint only
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
