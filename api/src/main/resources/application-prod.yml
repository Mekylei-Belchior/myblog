# Production profile — PostgreSQL datasource, H2 console disabled, restricted CORS, INFO logging
spring:
  datasource:
    driverClassName: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
    settings:
      web-allow-others: false
  flyway:
    locations: classpath:db/specific/postgresql

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8082}

logging:
  level:
    root: INFO
