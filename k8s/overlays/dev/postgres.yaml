apiVersion: apps/v1
kind: Deployment
metadata:
  name: myblog-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myblog-postgres
  template:
    metadata:
      labels:
        app: myblog-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: myblog
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: myblog-secrets
                  key: db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myblog-secrets
                  key: db-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: myblog-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: myblog-postgres
spec:
  selector:
    app: myblog-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myblog-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
