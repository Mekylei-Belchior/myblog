apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myblog-ingress
spec:
  rules:
    - host: myblog.lab.home
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: myblog-api-svc
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myblog-client-svc
                port:
                  number: 80
