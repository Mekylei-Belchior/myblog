apiVersion: apps/v1
kind: Deployment
metadata:
  name: myblog-api
  labels:
    app: myblog-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myblog-api
  template:
    metadata:
      labels:
        app: myblog-api
    spec:
      containers:
        - name: myblog-api
          image: 192.168.0.106:5000/myblog/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myblog-secrets
                  key: jwt-secret
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: myblog-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: myblog-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myblog-secrets
                  key: db-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myblog-client
  labels:
    app: myblog-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myblog-client
  template:
    metadata:
      labels:
        app: myblog-client
    spec:
      containers:
        - name: myblog-client
          image: 192.168.0.106:5000/myblog/client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
