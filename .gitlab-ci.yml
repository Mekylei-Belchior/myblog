stages:
  - compile
  - build
  - deploy

variables:
  REGISTRY: registry.lab.home
  IMAGE_API: $REGISTRY/root/myblog/api
  IMAGE_CLIENT: $REGISTRY/root/myblog/client

compile-api:
  stage: compile
  image: eclipse-temurin:21-jdk-jammy
  script:
    - cd api && chmod +x gradlew && ./gradlew bootJar --no-daemon
  artifacts:
    paths:
      - api/build/libs/
    expire_in: 1 hour
  only:
    - develop

build-api:
  stage: build
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  needs:
    - compile-api
  before_script:
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASS" "$REGISTRY"
  script:
    - docker build -t "$IMAGE_API:$CI_COMMIT_SHA" -t "$IMAGE_API:latest" api/
    - docker push "$IMAGE_API:$CI_COMMIT_SHA"
    - docker push "$IMAGE_API:latest"
  only:
    - develop

build-client:
  stage: build
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASS" "$REGISTRY"
  script:
    - docker build -t "$IMAGE_CLIENT:$CI_COMMIT_SHA" -t "$IMAGE_CLIENT:latest" client/
    - docker push "$IMAGE_CLIENT:$CI_COMMIT_SHA"
    - docker push "$IMAGE_CLIENT:latest"
  only:
    - develop

deploy:
  stage: deploy
  image: docker:24
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    PROJECT_DIR: /home/dell/workspace/projects/myblog
  before_script:
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASS" "$REGISTRY"
  script:
    - docker compose
        -f "$PROJECT_DIR/docker-compose.yml"
        -f "$PROJECT_DIR/docker-compose.lab.yml"
        pull app-server app-client
    - docker compose
        -f "$PROJECT_DIR/docker-compose.yml"
        -f "$PROJECT_DIR/docker-compose.lab.yml"
        down --remove-orphans || true
    - docker compose
        -f "$PROJECT_DIR/docker-compose.yml"
        -f "$PROJECT_DIR/docker-compose.lab.yml"
        up -d
  only:
    - develop
  needs:
    - build-api
    - build-client
