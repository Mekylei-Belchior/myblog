services:
  postgres:
    image: postgres:16
    container_name: postgres-myblog
    environment:
      POSTGRES_DB: myblog
      POSTGRES_USER: ${DB_USERNAME:-myblog}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app-server:
    container_name: api-myblog
    build:
      context: api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: jdbc:postgresql://postgres:5432/myblog
      DB_USERNAME: ${DB_USERNAME:-myblog}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost:8082
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  app-client:
    container_name: client-myblog
    build:
      context: client
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    restart: unless-stopped
    depends_on:
      app-server:
        condition: service_healthy

volumes:
  postgres_data: